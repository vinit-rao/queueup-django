{% extends 'layout.html' %}

{% block title %}Create - QueueUp{% endblock %}

{% block content %}
<div class="container mt-5 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card-dark p-5">
                <h1 class="mb-4 font-weight-bold text-white border-bottom pb-3 border-secondary">Create Post</h1>

                <form class="form-with-validation" action="{% url 'posts:new-post' %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-group mb-4">
                        <label class="form-label-muted text-muted">Title:</label>
                        <input type="text" name="title" id="id_title" class="form-control form-dark-input" placeholder="e.g. Need 2 more for Ranked" required>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label-muted text-muted">Body:</label>
                        <textarea name="body" id="id_body" class="form-control form-dark-input" rows="5" placeholder="e.g. Looking for chill people to play a few matches tonight. Must have a mic!" required></textarea>
                    </div>

                    <div class="form-group mb-4 position-relative">
                        <label class="form-label-muted text-muted">Game name:</label>
                        <input type="text" id="id_game_name" name="game_name" class="form-control form-dark-input" autocomplete="off" placeholder="Search for a game..." required>
                        <ul id="autocomplete-results" class="suggestions-dropdown d-none" style="list-style: none; padding: 0; margin: 0;"></ul>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label-muted text-muted">Tags (Optional):</label>
                        <input type="text" id="id_tags" name="tags" class="form-control form-dark-input" placeholder="e.g. casual, competitive, fps" autocomplete="off">
                        <small class="form-text text-muted mt-1">Max 5 tags, separated by commas. Max 12 characters per tag.</small>
                    </div>

                    {% for hidden in form.hidden_fields %}
                        {{ hidden }}
                    {% endfor %}

                    <button type="submit" class="btn-brand w-100 py-2 mt-4">Submit</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const gameInput = document.getElementById('id_game_name');
        const resultList = document.getElementById('autocomplete-results');

        gameInput.addEventListener('input', function() {
            const query = gameInput.value.trim();

            if (query.length < 2) {
                resultList.classList.add('d-none');
                return;
            }

            fetch(`{% url 'posts:api-game-search' %}?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    resultList.innerHTML = ''; // Clear old results

                    if (data.results.length > 0) {
                        data.results.forEach(game => {
                            const li = document.createElement('li');
                            li.className = 'suggestion-item d-flex align-items-center text-white';

                            // Icon
                            if (game.icon_url) {
                                const img = document.createElement('img');
                                img.src = game.icon_url;
                                img.className = 'autocomplete-icon mr-3';
                                img.style.width = '30px';
                                img.style.height = '30px';
                                img.style.borderRadius = '4px';
                                img.style.objectFit = 'cover';
                                li.appendChild(img);
                            } else {
                                const placeholder = document.createElement('div');
                                placeholder.textContent = '🎮';
                                placeholder.className = 'autocomplete-icon mr-3 d-flex align-items-center justify-content-center bg-dark';
                                placeholder.style.width = '30px';
                                placeholder.style.height = '30px';
                                placeholder.style.borderRadius = '4px';
                                li.appendChild(placeholder);
                            }

                            // Text
                            const textSpan = document.createElement('span');
                            textSpan.textContent = game.name;
                            textSpan.className = 'font-weight-bold';
                            li.appendChild(textSpan);

                            // Click Event to select the game
                            li.addEventListener('click', function() {
                                gameInput.value = game.name;
                                resultList.classList.add('d-none');
                            });

                            resultList.appendChild(li);
                        });

                        // Show the dropdown
                        resultList.classList.remove('d-none');
                    } else {
                        // Hide if no results
                        resultList.classList.add('d-none');
                    }
                })
                .catch(error => console.error('Error fetching games:', error));
        });

        // Hide dropdown if user clicks anywhere else on the screen
        document.addEventListener('click', function(e) {
            if (e.target !== gameInput && !resultList.contains(e.target)) {
                resultList.classList.add('d-none');
            }
        });

        // --- TAG VALIDATION (Max 5 tags, Max 12 chars per tag) ---
        const tagsInput = document.getElementById('id_tags');
        if (tagsInput) {
            tagsInput.addEventListener('input', function() {
                // 1. Split by commas and limit to 5 total tags
                let parts = this.value.split(',');
                if (parts.length > 5) {
                    parts = parts.slice(0, 5);
                    this.value = parts.join(',');
                }

                // 2. Limit each individual tag to 12 characters
                let validParts = this.value.split(',').map(tag => {
                    return tag.length > 12 ? tag.slice(0, 12) : tag;
                });

                if (this.value !== validParts.join(',')) {
                    this.value = validParts.join(',');
                }
            });
        }
    });
</script>
{% endblock %}
